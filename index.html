<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Joy's Love Quiz 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
min-height:100vh;
background:linear-gradient(135deg,#0a0f1f 0%,#1a1f3a 50%,#0a0f1f 100%);
display:flex;
justify-content:center;
align-items:center;
padding:15px;
color:#fff;
position:relative;
overflow-x:hidden;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle at 20% 50%,rgba(0,140,255,0.15),transparent 50%),
radial-gradient(circle at 80% 50%,rgba(138,43,226,0.15),transparent 50%);
animation:morphGradient 15s ease-in-out infinite;
pointer-events:none;
}
@keyframes morphGradient{
0%,100%{opacity:0.5}
50%{opacity:1}
}

.container{
max-width:900px;
width:100%;
background:rgba(10,15,31,0.7);
backdrop-filter:blur(20px);
border-radius:20px;
padding:30px;
box-shadow:0 8px 32px rgba(0,140,255,0.2);
border:1px solid rgba(0,170,255,0.3);
position:relative;
z-index:2;
}

h1{
font-size:2.2rem;
text-align:center;
margin-bottom:8px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
-webkit-background-clip:text;
background-clip:text;
-webkit-text-fill-color:transparent;
font-weight:700;
}

.subtitle{
text-align:center;
font-size:1rem;
margin-bottom:25px;
opacity:0.95;
}

.questions-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
gap:20px;
margin-bottom:25px;
}

.quiz-card{
background:rgba(0,119,255,0.1);
border-radius:15px;
padding:20px;
border:1px solid rgba(0,170,255,0.3);
}

.question{
font-size:1.1rem;
font-weight:600;
margin-bottom:12px;
color:#00c6ff;
}

.options{
display:flex;
flex-direction:column;
gap:8px;
}

.option{
background:rgba(0,119,255,0.15);
border:2px solid transparent;
border-radius:8px;
padding:10px 15px;
font-size:0.95rem;
cursor:pointer;
transition:all 0.2s ease;
color:#ccefff;
}

.option:hover{
background:rgba(0,119,255,0.25);
transform:translateX(3px);
border-color:rgba(0,198,255,0.3);
}

.option.selected{
background:rgba(0,198,255,0.3);
border-color:#00c6ff;
}

.submit-section{
text-align:center;
margin-top:20px;
}

.btn{
padding:15px 50px;
font-size:1.2rem;
font-weight:700;
border:none;
border-radius:12px;
cursor:pointer;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:#fff;
transition:all 0.3s ease;
box-shadow:0 4px 15px rgba(0,140,255,0.4);
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 6px 20px rgba(0,140,255,0.6);
}

.result{
display:none;
text-align:center;
font-size:3rem;
margin-top:20px;
animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(0.8)}
to{opacity:1;transform:scale(1)}
}

.result-text{
font-size:1.5rem;
margin-top:15px;
}

@media (max-width:768px){
.questions-grid{grid-template-columns:1fr;gap:15px}
.container{padding:20px}
h1{font-size:1.8rem}
.question{font-size:1rem}
.option{font-size:0.9rem;padding:8px 12px}
}
</style>
</head>
<body>

<div class="container">
<h1>Joy's Love & Fun Quiz 💕</h1>
<div class="subtitle">Answer these sweet questions and see your love score!</div>

<div class="questions-grid" id="questionsGrid"></div>

<div class="submit-section">
<button class="btn" onclick="submitQuiz()">Submit Answers 💖</button>
</div>

<div class="result" id="result"></div>
<div class="result-text" id="resultText"></div>
</div>

<script>
const quizData = [
  {
    question: "1. What's the best way to start the day? ☀️",
    options: ["A sweet good morning text 💌", "Coffee in bed ☕", "A warm hug 🤗", "Sleeping in 😴"]
  },
  {
    question: "2. Perfect date night is... 🌙",
    options: ["Stargazing together ✨", "Movie marathon 🎬", "Cooking dinner together 🍝", "Adventure outdoors 🏞️"]
  },
  {
    question: "3. Love language? 💕",
    options: ["Words of affirmation 💬", "Quality time ⏰", "Physical touch 🤗", "Acts of service 🎁"]
  },
  {
    question: "4. Ideal weekend activity? 🎉",
    options: ["Cozy at home 🏠", "Exploring new places 🗺️", "Brunch with friends 🥞", "Netflix & chill 📺"]
  },
  {
    question: "5. Favorite emoji? 😊",
    options: ["❤️ Heart", "😂 Laughing", "🥰 Love face", "✨ Sparkles"]
  },
  {
    question: "6. Dream vacation? ✈️",
    options: ["Beach paradise 🏖️", "Mountain retreat ⛰️", "City adventure 🌆", "Countryside escape 🌾"]
  },
  {
    question: "7. Comfort food? 🍕",
    options: ["Pizza 🍕", "Ice cream 🍦", "Chocolate 🍫", "Fries 🍟"]
  },
  {
    question: "8. Best gift to receive? 🎁",
    options: ["Handwritten letter 💌", "Surprise date 🎊", "Thoughtful gift 🎁", "Quality time together ⏰"]
  },
  {
    question: "9. Rainy day activity? 🌧️",
    options: ["Reading books 📚", "Baking treats 🧁", "Dancing in rain 💃", "Cuddling up 🛋️"]
  },
  {
    question: "10. What makes you smile most? 😊",
    options: ["Cute messages 💬", "Inside jokes 😄", "Random surprises 🎉", "Deep conversations 💭"]
  }
];

const answers = {};

function loadQuestions() {
  const grid = document.getElementById('questionsGrid');
  
  quizData.forEach((q, qIndex) => {
    const card = document.createElement('div');
    card.className = 'quiz-card';
    
    const question = document.createElement('div');
    question.className = 'question';
    question.textContent = q.question;
    card.appendChild(question);
    
    const optionsDiv = document.createElement('div');
    optionsDiv.className = 'options';
    
    q.options.forEach((option, oIndex) => {
      const optionDiv = document.createElement('div');
      optionDiv.className = 'option';
      optionDiv.textContent = option;
      optionDiv.onclick = () => selectOption(qIndex, oIndex, optionDiv);
      optionsDiv.appendChild(optionDiv);
    });
    
    card.appendChild(optionsDiv);
    grid.appendChild(card);
  });
}

function selectOption(questionIndex, optionIndex, element) {
  const card = element.parentElement.parentElement;
  const options = card.querySelectorAll('.option');
  options.forEach(opt => opt.classList.remove('selected'));
  element.classList.add('selected');
  answers[questionIndex] = optionIndex;
}

function submitQuiz() {
  const answeredCount = Object.keys(answers).length;
  
  if (answeredCount < quizData.length) {
    alert(`Please answer all questions! You've answered ${answeredCount} out of ${quizData.length}`);
    return;
  }
  
  const resultDiv = document.getElementById('result');
  const resultText = document.getElementById('resultText');
  
  const messages = [
    { emoji: '💖✨', text: 'You are absolutely amazing, Joy! Full of love and fun!' },
    { emoji: '🌟💕', text: 'Your heart is pure magic! Keep shining, Joy!' },
    { emoji: '🎉❤️', text: 'Perfect score for a perfect person! You rock, Joy!' },
    { emoji: '💝🌈', text: 'Your answers show how beautiful your soul is!' },
    { emoji: '🥰💫', text: 'Joy, you bring happiness wherever you go!' }
  ];
  
  const randomMessage = messages[Math.floor(Math.random() * messages.length)];
  
  resultDiv.textContent = randomMessage.emoji;
  resultText.textContent = randomMessage.text;
  resultDiv.style.display = 'block';
  resultText.style.display = 'block';
  
  document.querySelector('.btn').textContent = 'Restart Quiz 🔄';
  document.querySelector('.btn').onclick = restartQuiz;
}

function restartQuiz() {
  location.reload();
}

loadQuestions();
</script>

</body>
</html>
